name: 🔨 Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with coverage
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./CoverageReport" \
            -reporttypes:"Html;HtmlSummary;Badges;JsonSummary;Cobertura" \
            -title:"Subiekt 123 Connector"

      - name: Coverage summary
        run: |
          python3 - << 'PYEOF'
          import json, sys
          try:
              d = json.load(open('./CoverageReport/Summary.json'))
              s = d.get('summary', {})
              line = s.get('linecoverage', 0)
              branch = s.get('branchcoverage', 0)
              method = s.get('methodcoverage', 0)
              covered = s.get('coveredlines', 0)
              coverable = s.get('coverablelines', 0)
              print(f"📊 Coverage Report")
              print(f"   Line:   {line:.1f}%  ({covered}/{coverable} lines)")
              print(f"   Branch: {branch:.1f}%")
              print(f"   Method: {method:.1f}%")
              # Fail if line coverage drops below threshold
              threshold = 5.0
              if line < threshold:
                  print(f"❌ Line coverage {line:.1f}% below threshold {threshold}%")
                  sys.exit(1)
              print(f"✅ Coverage OK")
          except Exception as e:
              print(f"⚠️  Could not parse coverage: {e}")
          PYEOF

      - name: Upload test results (.trx)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"

      - name: Upload coverage report (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: CoverageReport/

      - name: Upload coverage (Cobertura for PR annotation)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-cobertura
          path: "TestResults/**/coverage.cobertura.xml"

      - name: Coverage comment on PR
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: github.event_name == 'pull_request'
        with:
          filename: "TestResults/**/coverage.cobertura.xml"
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          output: both
          thresholds: '5 50'
        continue-on-error: true

      - name: Add PR coverage comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md
        continue-on-error: true
